name: Monthly Crime Data Pipeline

on:
  schedule:
    - cron: '0 6 1 * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Run ingest
        run: python src/ingest.py

      - name: Run transform
        run: python src/transform.py

      - name: Run load
        run: python src/load.py

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/
          git commit -m "chore: update crime data"
          git push
